services:
  antifraud-server:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    command: ./server
    ports:
      - 8080:8080
    environment:
      - HTTP_PORT=8080
      - PG_DSN=postgres://user:password@antifraud-db:5432/antifraud?sslmode=disable
      - KAFKA_BROKERS=kafka:29092
      - REDIS_ADDR=redis:6379
    depends_on:
      antifraud-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - backend_net

  antifraud-worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    command: ./worker
    environment:
      - PG_DSN=postgres://user:password@antifraud-db:5432/antifraud?sslmode=disable
      - KAFKA_BROKERS=kafka:29092
      - REDIS_ADDR=redis:6379
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - backend_net

  antifraud-db:
    image: postgres:16-alpine
    container_name: antifraud-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: antifraud
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d antifraud"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend_net

  redis:
    image: redis:8-alpine
    container_name: antifraud-redis
    ports:
      - "6379:6379"
    networks:
      - backend_net
    volumes:
      - redis_data:/data

  redis-ui:
    image: rediscommander/redis-commander
    ports:
      - "8081:8081"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis
    networks:
      - backend_net

  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: antifraud-kafka
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/9092'"]
      interval: 10s
      timeout: 10s
      retries: 5
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092"
      KAFKA_JMX_PORT: 9101
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:29093"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LOG_DIRS: "/var/lib/kafka/data"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    networks:
      - backend_net

  kafka-ui:
    image: ghcr.io/kafbat/kafka-ui:latest
    ports:
      - "8082:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      - kafka
    networks:
      - backend_net

  prometheus:
    image: prom/prometheus:latest
    container_name: antifraud-prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - backend_net

  grafana:
    image: grafana/grafana:latest
    container_name: antifraud-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - backend_net

networks:
  backend_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
